name: demandium_provider
description: A new Flutter project.


publish_to: 'none' #

version: 2.7.2+272

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  get: ^4.7.3
  intl: ^0.20.2
  path: ^1.9.1
  http: ^1.6.0
  shared_preferences: ^2.5.4
  connectivity_plus: ^7.0.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  image_picker: ^1.2.1
  image_cropper: ^9.1.0
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.2
  country_code_picker: ^3.4.1
  pin_code_fields: ^8.0.1
  flutter_widget_from_html_core: ^0.17.0
  flutter_typeahead: ^5.2.0
  shimmer_animation: ^2.2.2+1
  fl_chart: ^1.2.0
  dotted_border: ^3.1.0
  flutter_local_notifications: ^21.0.0
  file_picker: ^10.3.10
  pdf: ^3.12.0
  open_file: ^3.5.11
  flutter_downloader: ^1.12.0
  permission_handler: ^12.0.1
  printing: ^5.14.3
  expandable_bottom_sheet: ^1.1.1+1
  shimmer: ^3.0.0
  currency_text_input_formatter: ^2.3.0
  graphic: ^2.7.0
  syncfusion_flutter_charts: ^33.1.45
  google_maps_flutter: ^2.16.0
  geolocator: ^14.0.2
  flutter_slidable: ^4.0.3
  flutter_switch: ^0.3.2
  just_the_tooltip: ^0.0.12
  flutter_inappwebview: ^6.1.5
  razorpay_flutter: ^1.4.0
  universal_html: ^2.3.0
  scroll_to_index: ^3.0.1
  photo_view: ^0.15.0
  phone_numbers_parser: ^9.0.20
  path_provider: ^2.1.5
  video_player: ^2.11.1
  chewie: ^1.13.0
  firebase_auth: ^6.3.0
  readmore: ^3.0.0
  showcaseview: ^5.0.1
  skeletonizer: ^2.1.3
  syncfusion_flutter_calendar: ^33.1.45
  loading_animation_widget: ^1.3.0



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  change_package_name: ^1.1.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "provider.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "provider.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/language/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/font/Outfit-Light.ttf
          weight: 300
        - asset: assets/font/Outfit-Regular.ttf
          weight: 400
        - asset: assets/font/Outfit-Medium.ttf
          weight: 500
        - asset: assets/font/Outfit-Bold.ttf
          weight: 700
